name: Evaluate Training Submissions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch:
    inputs:
      participant_branch:
        description: "Participant branch name, for example participant-taniya-gupta"
        required: true
        type: string
      participant_name:
        description: "Participant folder name, for example taniya-gupta"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    name: Run AI review
    runs-on: ubuntu-latest

    steps:
      - name: Decide branch and participant name
        id: details
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ github.event.inputs.participant_branch }}"
            PARTICIPANT_NAME="${{ github.event.inputs.participant_name }}"
            CHECKOUT_REF="$BRANCH_NAME"
          else
            BRANCH_NAME="${{ github.head_ref }}"
            PARTICIPANT_NAME="${BRANCH_NAME#participant-}"
            CHECKOUT_REF="${{ github.event.pull_request.head.sha }}"
          fi

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "participant_name=$PARTICIPANT_NAME" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"

          echo "Branch name: $BRANCH_NAME"
          echo "Participant name: $PARTICIPANT_NAME"
          echo "Checkout ref: $CHECKOUT_REF"

      - name: Checkout participant code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.details.outputs.checkout_ref }}
          path: participant-code

      - name: Checkout main branch scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI review dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq

      - name: Run AI review for participant submission
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        shell: bash
        run: |
          PARTICIPANT="${{ steps.details.outputs.participant_name }}"

          cd participant-code
          find submissions -type d -name "$PARTICIPANT" -print > ../participant_paths.txt
          cd ..

          echo "# AI Review Combined Report" > ai_review_report.md
          echo "" >> ai_review_report.md
          echo "**Participant:** $PARTICIPANT" >> ai_review_report.md
          echo "" >> ai_review_report.md
          echo "**Branch:** ${{ steps.details.outputs.branch_name }}" >> ai_review_report.md
          echo "" >> ai_review_report.md
          echo "> This is an AI-assisted review. Final marks should be confirmed by the trainer." >> ai_review_report.md
          echo "" >> ai_review_report.md

          if [ ! -s participant_paths.txt ]; then
            echo "No participant submission folders found for $PARTICIPANT." >> ai_review_report.md
            echo "" >> ai_review_report.md
            echo "Please check whether the branch name and folder name are matching." >> ai_review_report.md
            echo "" >> ai_review_report.md
            echo "Expected branch format: participant-firstname-lastname" >> ai_review_report.md
            echo "Expected folder name: firstname-lastname" >> ai_review_report.md
          fi

          while read submission_path; do
            echo "Reviewing participant-code/$submission_path"

            SAFE_NAME=$(echo "$submission_path" | tr '/' '-')

            python main-code/.github/scripts/ai_review_submission.py \
              --participant "$PARTICIPANT" \
              --submission-path "participant-code/$submission_path" \
              --output "ai_review_${SAFE_NAME}.md"

            cat "ai_review_${SAFE_NAME}.md" >> ai_review_report.md
            echo "" >> ai_review_report.md
            echo "---" >> ai_review_report.md
            echo "" >> ai_review_report.md

          done < participant_paths.txt

      - name: Add AI review to workflow summary
        run: |
          cat ai_review_report.md >> "$GITHUB_STEP_SUMMARY"
