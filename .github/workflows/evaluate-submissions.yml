name: Evaluate Training Submissions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "submissions/**"
      - ".github/workflows/evaluate-submissions.yml"
      - ".github/scripts/ai_review_submission.py"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    name: Run AI review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout participant code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI review dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq

      - name: Extract participant folder name
        id: participant
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          PARTICIPANT_NAME="${BRANCH_NAME#participant-}"
          echo "participant_name=$PARTICIPANT_NAME" >> "$GITHUB_OUTPUT"
          echo "Participant folder name: $PARTICIPANT_NAME"

      - name: Run AI review for participant submission
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        shell: bash
        run: |
          PARTICIPANT="${{ steps.participant.outputs.participant_name }}"

          find submissions -type d -name "$PARTICIPANT" -print > participant_paths.txt

          echo "# AI Review Combined Report" > ai_review_report.md
          echo "" >> ai_review_report.md
          echo "**Participant:** $PARTICIPANT" >> ai_review_report.md
          echo "" >> ai_review_report.md
          echo "> This is an AI-assisted review. Final marks should be confirmed by the trainer." >> ai_review_report.md
          echo "" >> ai_review_report.md

          if [ ! -s participant_paths.txt ]; then
            echo "No participant submission folders found for $PARTICIPANT." >> ai_review_report.md
            echo "" >> ai_review_report.md
            echo "Please check whether the branch name and folder name are matching." >> ai_review_report.md
            echo "" >> ai_review_report.md
            echo "Expected branch format: participant-firstname-lastname" >> ai_review_report.md
            echo "Expected folder name: firstname-lastname" >> ai_review_report.md
          fi

          while read submission_path; do
            echo "Reviewing $submission_path"

            SAFE_NAME=$(echo "$submission_path" | tr '/' '-')

            python .github/scripts/ai_review_submission.py \
              --participant "$PARTICIPANT" \
              --submission-path "$submission_path" \
              --output "ai_review_${SAFE_NAME}.md"

            cat "ai_review_${SAFE_NAME}.md" >> ai_review_report.md
            echo "" >> ai_review_report.md
            echo "---" >> ai_review_report.md
            echo "" >> ai_review_report.md

          done < participant_paths.txt

      - name: Add AI review to workflow summary
        run: |
          cat ai_review_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment AI review on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            if (!fs.existsSync("ai_review_report.md")) {
              console.log("No AI review report found.");
              return;
            }

            const report = fs.readFileSync("ai_review_report.md", "utf8");

            const marker = "<!-- ai-review-report -->";
            const body = `${marker}\n${report}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existingComment = comments.data.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
